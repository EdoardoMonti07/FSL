document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(go, 250);\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"adb82ad4-c59a-4a7d-b260-2ebd9e555cae#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n<!-- ═══════════════ SLIDE 1 — COVER ═══════════════ -->\n<section data-label=\"Cover\" data-screen-label=\"01 Cover\" data-speaker-notes=\"Apertura. Mi presento: Edoardo Monti, 5D. Nel triennio ho svolto tre percorsi FSL molto diversi ma uniti da un filo conduttore: tecnologia, impresa e innovazione.\" style=\"position:relative; box-sizing:border-box; padding:96px; display:flex; flex-direction:column; justify-content:space-between; background:#0E1116; color:#F4F5F7; font-family:'Space Grotesk',sans-serif; overflow:hidden;\">\n  <div style=\"position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.035) 1px,transparent 1px); background-size:64px 64px; pointer-events:none;\"><\u002Fdiv>\n  <div data-drift=\"\" style=\"position:absolute; top:-160px; right:-120px; width:520px; height:520px; border-radius:999px; background:radial-gradient(circle at center, rgba(232,255,77,0.20), transparent 68%); filter:blur(8px); pointer-events:none;\"><\u002Fdiv>\n  <div data-drift=\"\" style=\"position:absolute; bottom:-200px; left:-120px; width:520px; height:520px; border-radius:999px; background:radial-gradient(circle at center, rgba(255,92,168,0.16), transparent 68%); filter:blur(8px); pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative; display:flex; align-items:center; gap:14px;\">\n    <span style=\"width:10px; height:10px; border-radius:999px; background:#E8FF4D;\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace; font-size:18px; letter-spacing:0.26em; text-transform:uppercase; color:#9AA2B1;\">Percorsi per le Competenze Trasversali e l'Orientamento<\u002Fspan>\n  <\u002Fdiv>\n\n  <div style=\"position:relative;\">\n    <div style=\"font-family:'Space Mono',monospace; font-size:24px; letter-spacing:0.14em; color:#9AA2B1; margin-bottom:26px;\">Il mio percorso FSL — triennio 2024 / 2026<\u002Fdiv>\n    <h1 style=\"margin:0; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:150px; line-height:1.0; letter-spacing:-0.035em;\">\n      <span style=\"color:#E8FF4D;\">Tecnologia,<\u002Fspan><br>\n      <span style=\"color:#FF5CA8;\">impresa &amp;<\u002Fspan><br>\n      <span style=\"color:#5CC8FF;\">innovazione.<\u002Fspan>\n    <\u002Fh1>\n  <\u002Fdiv>\n\n  <div style=\"position:relative; display:flex; align-items:flex-end; justify-content:space-between; gap:40px;\">\n    <div>\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:42px; letter-spacing:-0.02em;\">Edoardo Monti<\u002Fdiv>\n      <div style=\"font-size:24px; color:#9AA2B1; margin-top:6px;\">5ª D · Liceo Scientifico Galileo Ferraris<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; gap:12px;\">\n      <span data-float=\"\" style=\"font-family:'Space Mono',monospace; font-size:18px; letter-spacing:0.06em; color:#0E1116; background:#E8FF4D; padding:11px 18px; border-radius:999px;\">Elmec<\u002Fspan>\n      <span data-float=\"\" style=\"font-family:'Space Mono',monospace; font-size:18px; letter-spacing:0.06em; color:#0E1116; background:#FF5CA8; padding:11px 18px; border-radius:999px;\">Sodalitas<\u002Fspan>\n      <span data-float=\"\" style=\"font-family:'Space Mono',monospace; font-size:18px; letter-spacing:0.06em; color:#0E1116; background:#5CC8FF; padding:11px 18px; border-radius:999px;\">Leonardo<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ SLIDE 2 — IL PERCORSO ═══════════════ -->\n<section data-label=\"Il percorso\" data-screen-label=\"02 Timeline\" data-speaker-notes=\"Tre tappe nell'arco del triennio: l'estate in Elmec a ricondizionare laptop, l'autunno con Sodalitas sulla creazione d'impresa, e la g rte<\u002Fdiv>\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:36px; line-height:1.12; letter-spacing:-0.02em;\">Un'esperienza di volo in elicottero sul Lago Maggiore.<\u002Fdiv>\n        <p style=\"margin:14px 0 0; font-size:22px; line-height:1.4; color:#9AA2B1;\">Osservare da vicino un mezzo aeronautico e il lavoro dei professionisti del settore.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ SLIDE 6 — CONCLUSIONE ═══════════════ -->\n<section data-label=\"Conclusione\" data-screen-label=\"06 Conclusione\" data-speaker-notes=\"In sintesi: tre percorsi diversi, un unico filo conduttore tra tecnologia, impresa e innovazione. L'esperienza sulla startup ha confermato il mio interesse per il mondo imprenditoriale: per questo voglio proseguire gli studi alla Bocconi, per acquisire competenze economiche e manageriali e sviluppare progetti e startup innovative. Grazie.\" style=\"position: absolute; box-sizing: border-box; padding: 84px 96px; display: flex; flex-direction: column; background: #0E1116; color: #F4F5F7; font-family: 'Space Grotesk',sans-serif; overflow: hidden; left: 1px; top: 26px\">\n  <div data-drift=\"\" style=\"position:absolute; bottom:-180px; right:-120px; width:560px; height:560px; border-radius:999px; background:radial-gradient(circle at center, rgba(92,200,255,0.16), transparent 68%); filter:blur(8px); pointer-events:none;\"><\u002Fdiv>\n  <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:18px;\">\n    <span style=\"width:10px; height:10px; border-radius:999px; background:#F4F5F7;\"><\u002Fspan>\n    <span style=\"font-family:'Space Mono',monospace; font-size:18px; letter-spacing:0.24em; text-transform:uppercase; color:#9AA2B1;\">In sintesi · uno sguardo al futuro<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"margin:0 0 36px; font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:88px; line-height:0.98; letter-spaci
